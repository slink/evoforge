[run]
name = "levy_proof_search_001"
backend = "lean"
seed = 42

[population]
size = 30
elite_k = 2

[selection]
strategy = "lexicase"
tournament_size = 3
epsilon = 0.0

[mutation]
schedule = "phased"
llm_weight = 0.6
cheap_weight = 0.4
crossover_weight = 0.2

[llm]
model = "claude-haiku-4-5-20251001"
reflection_model = "claude-sonnet-4-5-20250929"
temperature = 0.7
temperature_start = 1.0
temperature_end = 0.3
temperature_schedule = "linear"
max_tokens = 4096
max_calls = 1000
max_cost_usd = 50.0
max_attempts = 3

[eval]
max_concurrent = 4
timeout_seconds = 60.0
seed = 42

[backend]
name = "lean"
theorem_statement = "theorem norm_le_one {φ : ℝ → ℂ} (hφ : IsPositiveDefinite φ) (h0 : φ 0 = 1) (ξ : ℝ) : ‖φ ξ‖ ≤ 1"
project_dir = "/Users/sglink/Desktop/Projects/LeanLevy"
repl_path = ""
imports = "import LeanLevy\nopen ProbabilityTheory ProbabilityTheory.IsPositiveDefinite"
seeds = [
  # norm_le_one specific: by_cases on whether φ ξ = 0
  "by_cases h : φ ξ = 0\n· simp [h]\n· nlinarith [norm_nonneg (φ ξ)]",
  # Use the 2x2 PD form: take n=2, x=(0,ξ), c=(1, -φξ/‖φξ‖)
  "have h2 := hφ 2 ![0, ξ] ![1, -(φ ξ / ‖φ ξ‖)]\nsimp [Fin.sum_univ_two, h0] at h2\nlinarith [norm_nonneg (φ ξ)]",
  # Apply conj_neg (Hermitian symmetry) then algebraic manipulation
  "have hsym := hφ.conj_neg ξ\nhave h0re := hφ.apply_zero_nonneg\nsimp [h0] at h0re hsym ⊢\nlinarith [norm_nonneg (φ ξ)]",
  # suffices: reduce to 2*‖φ ξ‖ ≤ 2
  "suffices h : 2 * ‖φ ξ‖ ≤ 2 by linarith\nnlinarith [hφ.re_nonneg 2 ![0, ξ] ![1, -(φ ξ / ‖φ ξ‖)]]",
  # Direct: use re_nonneg with 2x2 matrix and norm bound
  "have := hφ.re_nonneg 2 ![0, ξ] ![1, -(φ ξ / ‖φ ξ‖)]\nsimp [Fin.sum_univ_two, h0, hφ.conj_neg] at this\nlinarith [norm_nonneg (φ ξ)]",
]

[evolution]
max_generations = 200
stagnation_window = 10
checkpoint_every = 10
log_level = "INFO"

[reflection]
interval = 10
include_top_k = 5
include_bottom_k = 5

[memory]
max_patterns = 20
max_dead_ends = 15
max_constructs = 30
stagnation_window = 20

[scheduler]
mode = "async_batch"
max_llm_concurrent = 4
max_eval_concurrent = 8
max_pending = 16
llm_budget_per_gen = 15

[diversity]
strategy = "map_elites"
sampling = "weighted"

[ablation]
disable_llm = false
disable_diagnostics = false
disable_reflection = false
disable_memory = false
disable_cheap_operators = false
disable_credit = false
